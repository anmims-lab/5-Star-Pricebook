    h1 { margin: 0 0 8px; font-size: 32px; }

    .section-title {

      padding: 10px 16px; font-size: 14px;
    }
    .filter-btn.active { background: #0f172a; color: white; border-color: #0f172a; }
    .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-card { padding: 18px; }
    .stat-label { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }
    .stat-value { font-size: 22px; font-weight: bold; }
    .layout { display: grid; grid-template-columns: 280px 1fr; gap: 24px; }
    .panel { padding: 18px; }
    .subcat-list { display: flex; flex-direction: column; gap: 10px; max-height: 650px; overflow-y: auto; }
    .subcat-btn {
      display: flex; justify-content: space-between; align-items: center; border: none; width: 100%;
      background: #f1f5f9; color: #0f172a; border-radius: 14px; padding: 12px 14px; text-align: left; font-size: 14px;
    }
    .subcat-btn.active { background: #0f172a; color: white; }
    .count-pill {
      background: rgba(255,255,255,0.9); color: #0f172a; padding: 3px 8px; border-radius: 999px; font-size: 12px;
    }
    .subcat-btn.active .count-pill { background: rgba(255,255,255,0.2); color: white; }
    .item-list { display: flex; flex-direction: column; gap: 16px; }
    .item-card { padding: 20px; }
    .badges { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .badge { background: #e2e8f0; border-radius: 999px; padding: 6px 10px; font-size: 12px; }
    .item-name { font-size: 22px; font-weight: bold; margin-bottom: 4px; }
    .item-code { color: #64748b; font-size: 14px; margin-bottom: 10px; }
    .item-description { color: #334155; margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; }
    .item-path { color: #64748b; font-size: 12px; margin-bottom: 14px; }
    .price-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .price-box { background: #f1f5f9; border-radius: 14px; padding: 14px; }
    .price-label { font-size: 12px; text-transform: uppercase; color: #64748b; margin-bottom: 6px; }
    .price-value { font-size: 22px; font-weight: bold; }
    .empty { padding: 36px; text-align: center; }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr; }
      .price-grid { grid-template-columns: 1fr; }
    }
  </style>

    let selectedCategory = 'All';
    let selectedSubcategory = 'All';
    let searchText = '';

    function unique(arr) {
      return [...new Set(arr.filter(Boolean))].sort((a, b) => String(a).localeCompare(String(b)));
    }
    function formatMoney(value) {
      if (value === '' || value === null || value === undefined) return '—';
      const num = Number(String(value).replace(/[^0-9.-]/g, ''));
      if (isNaN(num)) return String(value) || '—';
      return num.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
    }
    function escapeHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }
    function escapeJs(str) {
      return String(str ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    }
    function getCategories() {
      return ['All', ...unique(allItems.map(item => item.category2))];
    }
    function getSubcategories() {
      const base = allItems.filter(item => selectedCategory === 'All' || item.category2 === selectedCategory);
      return ['All', ...unique(base.map(item => item.category3))];
    }
    function getFilteredItems() {
      const query = searchText.trim().toLowerCase();
      return allItems.filter(item => {
        const categoryMatch = selectedCategory === 'All' || item.category2 === selectedCategory;
        const subcategoryMatch = selectedSubcategory === 'All' || item.category3 === selectedSubcategory;
        const textBlob = [item.name, item.code, item.description, item.categoryPath].join(' ').toLowerCase();
        const searchMatch = !query || textBlob.includes(query);
        return categoryMatch && subcategoryMatch && searchMatch;
      });
    }
    function render() {
      const app = document.getElementById('app');
      const categories = getCategories();
      const subcategories = getSubcategories();
      const filtered = getFilteredItems();
      const avgPrice = filtered.length
        ? filtered.reduce((sum, item) => sum + (Number(String(item.price).replace(/[^0-9.-]/g, '')) || 0), 0) / filtered.length
        : 0;

      app.innerHTML = `
        <div class="header">
          <h1>5 Star Pricebook Browser</h1>
          <div class="subtext">Click categories, drill into subcategories, and search items without spreadsheet chaos.</div>
          <input id="searchBox" class="search-box" type="text" placeholder="Search by item name, code, description, or path" value="${escapeHtml(searchText)}">
          <div class="section-title">Categories</div>
          <div class="button-wrap">
            ${categories.map(cat => `
              <button class="filter-btn ${selectedCategory === cat ? 'active' : ''}" onclick="setCategory('${escapeJs(cat)}')">${escapeHtml(cat)}</button>
            `).join('')}
          </div>
        </div>

        <div class="stats">
          <div class="stat-card"><div class="stat-label">Loaded Items</div><div class="stat-value">${allItems.length}</div></div>
          <div class="stat-card"><div class="stat-label">Visible Items</div><div class="stat-value">${filtered.length}</div></div>
          <div class="stat-card"><div class="stat-label">Category</div><div class="stat-value">${escapeHtml(selectedCategory)}</div></div>
          <div class="stat-card"><div class="stat-label">Average Price</div><div class="stat-value">${formatMoney(avgPrice)}</div></div>
        </div>

        <div class="layout">
          <div class="panel">
            <div class="section-title" style="margin-top:0;">Subcategories</div>
            <div class="subcat-list">
              ${subcategories.map(sub => {
                const count = allItems.filter(item =>
                  (selectedCategory === 'All' || item.category2 === selectedCategory) &&
                  (sub === 'All' || item.category3 === sub)
                ).length;
                return `<button class="subcat-btn ${selectedSubcategory === sub ? 'active' : ''}" onclick="setSubcategory('${escapeJs(sub)}')"><span>${escapeHtml(sub)}</span><span class="count-pill">${count}</span></button>`;
              }).join('')}
            </div>
          </div>

          <div class="item-list">
            ${filtered.length ? filtered.map(item => `
              <div class="item-card">
                <div class="badges">
                  ${item.category2 ? `<span class="badge">${escapeHtml(item.category2)}</span>` : ''}
                  ${item.category3 ? `<span class="badge">${escapeHtml(item.category3)}</span>` : ''}
                </div>
                <div class="item-name">${escapeHtml(item.name || 'Unnamed Item')}</div>
                <div class="item-code">Code: ${escapeHtml(item.code || '—')}</div>
                <div class="item-description">${escapeHtml(item.description || 'No description')}</div>
                <div class="item-path">${escapeHtml(item.categoryPath || '')}</div>
                <div class="price-grid">
                  <div class="price-box"><div class="price-label">Standard Price</div><div class="price-value">${formatMoney(item.price)}</div></div>
                  <div class="price-box"><div class="price-label">Member Price</div><div class="price-value">${formatMoney(item.memberPrice)}</div></div>
                </div>
              </div>
            `).join('') : `<div class="empty"><h3>No items found</h3><p>Try a different filter or search.</p></div>`}
          </div>
        </div>
      `;
      document.getElementById('searchBox').addEventListener('input', function(e) {
        searchText = e.target.value;
        render();
      });
    }
    function setCategory(category) {
      selectedCategory = category;
      selectedSubcategory = 'All';
      render();
    }
    function setSubcategory(subcategory) {
      selectedSubcategory = subcategory;
      render();
    }
    render();
  </script>
